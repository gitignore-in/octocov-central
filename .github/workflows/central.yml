name: Collect

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,3,6,9 * * *'
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: write

jobs:
  collect:
    name: Collect code metrics using octocov central mode
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run octocov
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9

      - name: Prepend generated-file marker and commit
        if: github.event_name != 'pull_request'
        run: |
          set -e
          trap 'rm -f README.md.tmp' EXIT
          header='<!-- DO NOT EDIT: this file is auto-generated by octocov. Manual edits will be overwritten on the next workflow run. -->'
          { printf '%s\n\n' "${header}"; cat README.md; } > README.md.tmp
          mv README.md.tmp README.md
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md badges/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update by octocov"
            git push
          fi
