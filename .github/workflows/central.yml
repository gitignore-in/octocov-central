name: Collect

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,3,6,9 * * *'
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

jobs:
  collect:
    name: Collect code metrics using octocov central mode
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check source artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          artifact_refs_file="${RUNNER_TEMP}/octocov-artifact-refs.txt"
          awk '
            /^[[:space:]]*-[[:space:]]*artifact:\/\// {
              sub(/^[[:space:]]*-[[:space:]]*artifact:\/\//, "")
              print
            }
          ' .octocov.yml > "${artifact_refs_file}"

          if [ ! -s "${artifact_refs_file}" ]; then
            echo "::error title=No octocov source artifacts::.octocov.yml has no artifact:// datastores"
            exit 1
          fi

          metadata_jsonl="${RUNNER_TEMP}/octocov-source-artifacts.jsonl"
          metadata_tmp="badges/source-artifacts.json.tmp"
          : > "${metadata_jsonl}"
          trap 'rm -f "${metadata_tmp}"' EXIT

          missing=0
          while IFS= read -r artifact_ref; do
            owner=$(printf '%s\n' "${artifact_ref}" | cut -d/ -f1)
            repo=$(printf '%s\n' "${artifact_ref}" | cut -d/ -f2)
            artifact_name=$(printf '%s\n' "${artifact_ref}" | cut -d/ -f3-)

            if [ -z "${owner}" ] || [ -z "${repo}" ] || [ -z "${artifact_name}" ] || [ "${artifact_name}" = "${artifact_ref}" ]; then
              echo "::error title=Invalid octocov artifact URI::artifact://${artifact_ref}"
              missing=1
              continue
            fi

            artifacts_json="${RUNNER_TEMP}/octocov-artifacts-${owner}-${repo}.json"
            if ! gh api --paginate "repos/${owner}/${repo}/actions/artifacts" > "${artifacts_json}"; then
              echo "::error title=Cannot list octocov artifacts::artifact://${artifact_ref}"
              missing=1
              continue
            fi

            artifact_id=$(jq -s -r --arg name "${artifact_name}" '
              [.[].artifacts[] | select(.name == $name and .expired == false)]
              | sort_by(.created_at)
              | reverse
              | .[0].id // empty
            ' "${artifacts_json}")

            if [ -z "${artifact_id}" ]; then
              echo "::error title=Missing octocov artifact::artifact://${artifact_ref} has no unexpired artifact"
              missing=1
              continue
            fi

            jq -s -c \
              --arg source "artifact://${artifact_ref}" \
              --arg owner "${owner}" \
              --arg repo "${repo}" \
              --arg artifact_name "${artifact_name}" \
              '
                [.[].artifacts[] | select(.name == $artifact_name and .expired == false)]
                | sort_by(.created_at)
                | reverse
                | .[0]
                | {
                    source: $source,
                    repository: ($owner + "/" + $repo),
                    artifact_name: $artifact_name,
                    artifact_id: .id,
                    digest: .digest,
                    size_in_bytes: .size_in_bytes,
                    created_at: .created_at,
                    expires_at: .expires_at,
                    archive_download_url: .archive_download_url,
                    workflow_run: {
                      id: .workflow_run.id,
                      head_branch: .workflow_run.head_branch,
                      head_sha: .workflow_run.head_sha,
                      repository_id: .workflow_run.repository_id,
                      head_repository_id: .workflow_run.head_repository_id
                    }
                  }
              ' "${artifacts_json}" >> "${metadata_jsonl}"
          done < "${artifact_refs_file}"

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          jq -s '{generated_at: (now | todateiso8601), sources: .}' "${metadata_jsonl}" > "${metadata_tmp}"
          mv "${metadata_tmp}" badges/source-artifacts.json

      - name: Run octocov
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

      - name: Post-process README and commit
        if: github.event_name != 'pull_request'
        run: |
          set -e
          trap 'rm -f README.md.tmp' EXIT
          # Header injected before the octocov output (octocov does not add this itself).
          header='<!-- DO NOT EDIT: this file is auto-generated by octocov. Manual edits will be overwritten on the next workflow run. -->'
          # Cross-reference link inserted after the "## Repositories" heading (octocov does not add this itself).
          metrics_note='Metric units and precision are described in [Metric Values](docs/metrics.md).'
          # Workaround: octocov renders the column header as "Time Execution Time"; correct it to "Test Execution Time".
          # This sed is a no-op once the upstream octocov issue is resolved.
          sed -i -e 's/Time Execution Time/Test Execution Time/g' README.md
          {
            printf '%s\n\n' "${header}"
            awk -v note="${metrics_note}" '
              { print }
              /^## Repositories$/ {
                print ""
                print note
              }
            ' README.md
          } > README.md.tmp
          mv README.md.tmp README.md
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md badges/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update by octocov"
            git push
          fi
