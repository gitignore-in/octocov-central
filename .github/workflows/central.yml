name: Collect

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Collect metrics but skip the README and badge commit (dry-run mode)'
        type: boolean
        default: false
  schedule:
    - cron: '0 0,3,6,9 * * *'  # 00:00, 03:00, 06:00, 09:00 UTC
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  collect:
    name: Collect code metrics using octocov central mode
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check source artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check-octocov-source-artifacts.py

      - name: Test source artifact selection
        run: python3 scripts/test-check-octocov-source-artifacts.py

      - name: Test badge state parser
        run: python3 scripts/test-check-badge-state.py

      - name: Test README badge contract parser
        run: python3 scripts/test-check-readme-badge-contract.py

      - name: Check badge state consistency
        run: python3 scripts/check-badge-state.py

      - name: Check README badge contract
        run: python3 scripts/check-readme-badge-contract.py

      - name: Run octocov
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

      - name: Post-process README and commit
        if: github.event_name != 'pull_request'
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          cleanup() {
            status=$?
            rm -f README.md.tmp
            if [ "$status" -ne 0 ] && [ "${REMOTE_BRANCH_PUSHED:-0}" = "1" ] && [ "${PR_CREATED:-0}" != "1" ] && [ -n "${BRANCH:-}" ]; then
              git push origin --delete "${BRANCH}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT
          # Header injected before the octocov output (octocov does not add this itself).
          header='<!-- DO NOT EDIT: this file is auto-generated by octocov. Manual edits will be overwritten on the next workflow run. -->'
          # Repository orientation injected before the octocov output.
          orientation=$(printf '%s\n' \
            "# octocov-central" \
            "" \
            "This repository is the central octocov dashboard for gitignore-in projects. It" \
            "collects octocov reports from configured source repositories, commits generated" \
            "badge SVGs under the badges directory, and publishes the generated metrics table below." \
            "" \
            "Use this repository to copy badge Markdown for supported projects or to check" \
            "the latest central-mode metrics. To add or remove a project, update the trusted" \
            "artifact sources in .octocov.yml; the Collect workflow reads those reports" \
            "on schedule, pushes to main, pull requests, and manual dispatch. Workflow" \
            "post-processing keeps this orientation text and metric notes in front of" \
            "the octocov generated table.")
          # Cross-reference link inserted after the "## Repositories" heading (octocov does not add this itself).
          metrics_note='Metric units and precision are described in [Metric Values](docs/metrics.md).'
          {
            printf '%s\n\n' "${header}"
            printf '%s\n\n' "${orientation}"
            awk -v note="${metrics_note}" '
              in_repositories && !corrected_time_header && /^\| Repository \| Coverage \| Code to Test Ratio \| Time Execution Time \| Badges \|$/ {
                sub(/\| Time Execution Time \|/, "| Test Execution Time |")
                corrected_time_header = 1
              }
              { print }
              /^## Repositories$/ {
                in_repositories = 1
                print ""
                print note
              }
            ' README.md
            # Workaround: octocov renders the column header as "Time Execution Time"; correct it to "Test Execution Time".
            # This sed is a no-op once the upstream octocov issue is resolved.
            sed -i -e 's/Time Execution Time/Test Execution Time/g' README.md
          } > README.md.tmp
          mv README.md.tmp README.md
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          AUTO_UPDATE_PR_TITLE="Update by octocov"
          AUTO_UPDATE_BRANCH="auto-update/octocov"

          # Close stale auto-update PRs created by prior run-id based branches.
          STALE_PR_COUNT=0
          if [ "${DRY_RUN}" = "true" ]; then
            echo "Dry run: skip stale PR cleanup."
          else
            while IFS= read -r stale_pr_number; do
              STALE_PR_COUNT=$((STALE_PR_COUNT + 1))
              echo "Closing superseded auto-update PR #${stale_pr_number}"
              gh pr close "${stale_pr_number}" --delete-branch --comment "Superseded by current auto-update/octocov branch." || true
            done < <(
              gh pr list --base main --state open --json number,title,headRefName --jq \
                --arg title "${AUTO_UPDATE_PR_TITLE}" --arg branch "${AUTO_UPDATE_BRANCH}" \
                '[.[] | select(.title == $title and .headRefName != $branch) | .number]'
            )
          fi

          echo "Closed ${STALE_PR_COUNT} stale auto-update PRs."

          git add -A -- README.md badges/
          git restore --staged -- 'badges/**/time.svg'
          if git diff --cached --quiet; then
            echo "No changes to commit"
          elif [ "${DRY_RUN}" = "true" ]; then
            echo "Dry run: skipping commit and push"
            git diff --cached --stat
          else
            git commit -m "Update by octocov"
            # Fixed branch, reused across runs: a superseded update is
            # force-pushed over instead of piling up a new PR per run.
            BRANCH="${AUTO_UPDATE_BRANCH}"
            REMOTE_BRANCH_PUSHED=0
            PR_CREATED=0
            git checkout -B "${BRANCH}"
            git push --force origin "${BRANCH}"
            REMOTE_BRANCH_PUSHED=1
            if [ "$(gh pr list --head "${BRANCH}" --state open --json number --jq length)" = "0" ]; then
              gh pr create \
                --title "${AUTO_UPDATE_PR_TITLE}" \
                --body "Automated octocov metrics update." \
                --base main \
                --head "${BRANCH}"
              PR_CREATED=1
            else
              echo "Reusing existing open PR for ${BRANCH}"
              PR_CREATED=1
            fi
            gh pr merge "${BRANCH}" --merge --auto --delete-branch || true
          fi
